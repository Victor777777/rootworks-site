        - generic [ref=e297]:
          - heading "Good questions" [level=2] [ref=e299]
          - generic [ref=e300]:
            - generic [ref=e301]:
              - button "So what do you actually do?" [ref=e302]:
                - generic [ref=e303]: So what do you actually do?
                - img [ref=e305]
              - paragraph [ref=e307]: We design and build digital products. Websites, apps, brands, design systems. Sometimes we're the entire design team. Sometimes we work alongside one. We spent a decade embedded with a global tech company, designing apps, branding, design systems, and mentoring junior designers. We also build complete products for startups from scratch. The common thread is senior-level design thinking applied directly to the work, not filtered through layers. Whether it's a two-person founding team or an established organisation, we scale to fit.
            - generic [ref=e308]:
              - button "Who does the work?" [ref=e309]:
                - generic [ref=e310]: Who does the work?
                - img [ref=e312]
              - paragraph [ref=e314]: Every project is founder-led from start to finish. We handle strategy, design, and production code directly. When a project needs specialist skills like motion, 3D, or backend engineering, we bring in trusted people we've worked with for years. The team scales to fit the work, but the creative direction and quality control always sit with us.
            - generic [ref=e315]:
              - button "What does AI-native actually mean?" [ref=e316]:
                - generic [ref=e317]: What does AI-native actually mean?
                - img [ref=e319]
              - paragraph [ref=e321]: It means AI is built into how we work, not bolted on. We use it across research, prototyping, code, and production. It's not a service we sell. It's why we can deliver the output of a larger studio without the overhead, the layers, or the timeline. The thinking, the taste, and the craft are ours. AI doesn't have those.
            - generic [ref=e322]:
              - button "How does a project actually work?" [ref=e323]:
                - generic [ref=e324]: How does a project actually work?
                - img [ref=e326]
              - paragraph [ref=e328]: It starts with understanding the problem properly. We spend real time upfront because most projects go sideways when the brief is unclear. From there we move into design and build in parallel, not sequentially. You work with us directly throughout, there's no handoff to a separate team. We check in regularly, course correct early, and ship when it's right.
            - generic [ref=e329]:
              - button "Why does taste matter now more than ever?" [ref=e330]:
                - generic [ref=e331]: Why does taste matter now more than ever?
                - img [ref=e333]
              - paragraph [ref=e335]: Because AI has made production cheap. Anyone can generate a website, a logo, a set of screens. What it can't do is edit with intention, feel when something is slightly off, or know when to stop. Twenty years of working at the highest level in design means we know what good looks like, and more importantly, what almost-good looks like. That difference is everything.
            - generic [ref=e336]:
              - button "How does pricing work?" [ref=e337]:
                - generic [ref=e338]: How does pricing work?
                - img [ref=e340]
              - paragraph [ref=e342]: We price per project, not per hour. We scope it properly before anything is committed, so there are no surprises. Typical engagements start from £15K for focused product work. Longer-term partnerships are structured monthly. If it's not the right fit on budget, we'll tell you upfront.
            - generic [ref=e343]:
              - button "How quickly can you deliver?" [ref=e344]:
                - generic [ref=e345]: How quickly can you deliver?
                - img [ref=e347]
              - paragraph [ref=e349]: Most projects run six to twelve weeks from kickoff to launch. AI tooling compresses the timeline significantly. What used to take months now takes weeks. If we're at capacity, we'll be honest about it and give you a realistic start date rather than spread ourselves thin.
            - generic [ref=e350]:
              - button "What's your ideal project?" [ref=e351]:
                - generic [ref=e352]: What's your ideal project?
                - img [ref=e354]
              - paragraph [ref=e356]: Something ambitious with people who care about the details. We're at our best when there's a real problem to solve, not just a brief to fill. Whether that's building a product from zero or rethinking something that already exists, we want to be in the room early, shaping the direction, not just executing someone else's spec. If you care about getting it right, we'll get along.
